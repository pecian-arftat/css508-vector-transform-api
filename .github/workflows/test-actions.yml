name: GTest CI

on:
  push:
    branches: [ "SubmissionBranch" ] # Triggers on push to the main branch
  pull_request:
    branches: [ "SubmissionBranch" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # Gets a copy of your code

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ libgtest-dev

    - name: Configure CMake
      # Assuming your project uses CMake to find GTest
      run: cmake -S ./src -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build

    - name: Run Tests
      # Replace 'my_test_executable' with your actual test binary name
      working-directory: src
      run: ctest --output-on-failure
